name: Google Sites Auto-fill

on:
  push:
    paths:
      - "autofill/requests/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: digireview-google-sites-autofill
  cancel-in-progress: false

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move to the latest main branch
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Process pending Google Sites requests
        run: node extract-google-sites.mjs

      - name: Commit extraction results
        run: |
          if [ -z "$(git status --porcelain autofill)" ]; then
            echo "No extraction result to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A autofill
          git commit -m "Process Google Sites auto-fill requests"
          git pull --rebase origin main
          git push origin HEAD:main
