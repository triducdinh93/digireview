name: Content Layout Audit

on:
  push:
    paths:
      - "posts.js"
      - "app.js"
      - "style.css"
      - "content-normalizer.js"
      - "audit-content-layout.mjs"
      - "audit-safe-flow-fixtures.mjs"
      - "extract-google-sites.mjs"
      - "admin.html"
      - "index.html"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: digireview-content-layout-audit
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Audit safe-flow regression fixtures
        run: npm run audit:fixtures

      - name: Audit all article layouts
        run: npm run audit:layout
