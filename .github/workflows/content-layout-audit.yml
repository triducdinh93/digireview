name: Structured Content Audit

on:
  push:
    paths:
      - "posts.js"
      - "app.js"
      - "style.css"
      - "content-schema.js"
      - "audit-content-layout.mjs"
      - "audit-safe-flow-fixtures.mjs"
      - "audit-v23-static.mjs"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Audit static architecture
        run: npm run audit:static
      - name: Audit schema fixtures
        run: npm run audit:fixtures
      - name: Audit all structured posts
        run: npm run audit:layout
