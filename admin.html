<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DigiReview Content Editor</title>
  <style>
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,sans-serif;background:#f3f5f8;color:#17202d} button,input,textarea,select{font:inherit} .wrap{width:min(1400px,calc(100% - 30px));margin:24px auto}.top{display:flex;justify-content:space-between;align-items:center;gap:20px;margin-bottom:20px}.top h1{margin:0}.actions{display:flex;flex-wrap:wrap;gap:8px}button,.button{border:0;border-radius:8px;padding:10px 13px;background:#1f5eff;color:#fff;font-weight:750;cursor:pointer}.secondary{background:#fff;color:#17202d;border:1px solid #d7dde7}.danger{background:#be3340}.layout{display:grid;grid-template-columns:330px minmax(0,1fr);gap:18px}.panel{background:#fff;border:1px solid #d7dde7;border-radius:13px;padding:16px}.post-list{display:grid;gap:8px;max-height:calc(100vh - 170px);overflow:auto}.post-item{border:1px solid #d7dde7;border-radius:9px;padding:10px;cursor:pointer}.post-item:hover,.post-item.active{border-color:#1f5eff;background:#edf3ff}.post-item strong{display:block;line-height:1.3}.post-item span{font-size:12px;color:#6b7483}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:13px}.full{grid-column:1/-1}label{display:grid;gap:6px;font-size:13px;font-weight:700}input,textarea,select{width:100%;border:1px solid #cfd6e1;border-radius:8px;padding:10px;background:#fff;color:#17202d}textarea{resize:vertical}.hint{color:#687080;font-size:12px;margin-top:4px}.status{padding:10px 12px;background:#edf3ff;border-radius:8px;color:#174bbf;margin-bottom:14px}.preview{border:1px solid #d7dde7;border-radius:10px;padding:18px;min-height:220px}.preview img{max-width:100%;border-radius:10px}.preview h1{line-height:1.15}.preview h2{margin-top:30px}.preview .cta{background:#17202d;color:#fff;padding:18px;border-radius:10px;text-align:center;margin:22px 0}.preview .cta a{display:inline-block;background:#ffbd2e;color:#17202d;padding:10px 14px;border-radius:8px;font-weight:800}@media(max-width:900px){.layout{grid-template-columns:1fr}.post-list{max-height:300px}.form-grid{grid-template-columns:1fr}.full{grid-column:auto}}
  </style>
  <script src="posts.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div><h1>DigiReview Content Editor</h1><div class="hint">Edits are saved in this browser. Export posts.js and replace the file in the data folder before redeploying.</div></div>
      <div class="actions"><button id="new-post">New post</button><button class="secondary" id="import-file">Import posts.js</button><input id="file-input" type="file" accept=".js,.json" hidden><button id="export-file">Export posts.js</button></div>
    </div>
    <div class="layout">
      <aside class="panel"><div class="status" id="status">Ready.</div><div class="post-list" id="post-list"></div></aside>
      <main class="panel">
        <form id="editor-form" class="form-grid">
          <input type="hidden" name="id">
          <label class="full">Title<input name="title" required></label>
          <label>Slug<input name="slug" required></label>
          <label>Date<input name="date" type="date" required></label>
          <label>Author<input name="author" value="Editorial Team"></label>
          <label>Featured<select name="featured"><option value="false">No</option><option value="true">Yes</option></select></label>
          <label class="full">Excerpt<textarea name="excerpt" rows="3" required></textarea></label>
          <label>Categories, comma separated<input name="categories"></label>
          <label>Tags, comma separated<input name="tags"></label>
          <label class="full">Featured image URL<input name="image"></label>
          <label>Rating out of 10<input name="rating" type="number" min="0" max="10" step="0.1"></label>
          <label>Vendor<input name="vendor"></label>
          <label>Price<input name="price"></label>
          <label>Product type<input name="type"></label>
          <label class="full">Best for<input name="bestFor"></label>
          <label class="full">Affiliate URL<input name="affiliateUrl"></label>
          <label class="full">Affiliate button text<input name="affiliateLabel" value="Check Current Offer"></label>
          <label class="full">Disclosure<textarea name="disclosure" rows="2"></textarea></label>
          <label>Pros, one per line<textarea name="pros" rows="6"></textarea></label>
          <label>Cons, one per line<textarea name="cons" rows="6"></textarea></label>
          <label class="full">Article HTML<textarea name="content" rows="20" required></textarea><span class="hint">Use &lt;h2&gt;, &lt;h3&gt;, &lt;p&gt;, &lt;ul&gt;, &lt;li&gt;, &lt;table&gt; and other standard HTML tags.</span></label>
          <div class="full actions"><button type="submit">Save post</button><button type="button" class="secondary" id="preview-button">Refresh preview</button><button type="button" class="danger" id="delete-post">Delete post</button></div>
        </form>
        <h2>Preview</h2><div class="preview" id="preview"></div>
      </main>
    </div>
  </div>
<script>
(() => {
  const original = window.BLOG_DATA || {site:{},pages:{},posts:[]};
  const saved = localStorage.getItem('digireview-admin-data');
  let data = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(original));
  let selectedId = data.posts[0]?.id || null;
  const list = document.getElementById('post-list');
  const form = document.getElementById('editor-form');
  const status = document.getElementById('status');
  const preview = document.getElementById('preview');
  const splitCsv = value => value.split(',').map(v=>v.trim()).filter(Boolean);
  const splitLines = value => value.split('\n').map(v=>v.trim()).filter(Boolean);
  const slugify = value => value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  const esc = value => String(value||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
  const persist = msg => { localStorage.setItem('digireview-admin-data', JSON.stringify(data)); status.textContent = msg; renderList(); };
  const renderList = () => { list.innerHTML = data.posts.slice().sort((a,b)=>new Date(b.date)-new Date(a.date)).map(p=>`<div class="post-item ${p.id===selectedId?'active':''}" data-id="${p.id}"><strong>${esc(p.title)}</strong><span>${esc(p.date)} · ${esc(p.categories?.[0]||'Uncategorized')}</span></div>`).join(''); };
  const selected = () => data.posts.find(p=>p.id===selectedId);
  const fill = post => {
    const values = {id:post.id,title:post.title,slug:post.slug,date:post.date,author:post.author,featured:String(!!post.featured),excerpt:post.excerpt,categories:(post.categories||[]).join(', '),tags:(post.tags||[]).join(', '),image:post.image,rating:post.rating,vendor:post.review?.vendor,price:post.review?.price,type:post.review?.type,bestFor:post.review?.bestFor,affiliateUrl:post.affiliateUrl,affiliateLabel:post.affiliateLabel,disclosure:post.disclosure,pros:(post.pros||[]).join('\n'),cons:(post.cons||[]).join('\n'),content:post.content};
    Object.entries(values).forEach(([name,value])=>{ if(form.elements[name]) form.elements[name].value=value??''; });
    renderPreview();
  };
  const formToPost = () => {
    const f = new FormData(form);
    return {id:Number(f.get('id'))||Date.now(),slug:f.get('slug').trim(),title:f.get('title').trim(),excerpt:f.get('excerpt').trim(),date:f.get('date'),updated:new Date().toISOString().slice(0,10),author:f.get('author').trim()||'Editorial Team',categories:splitCsv(f.get('categories')),tags:splitCsv(f.get('tags')),image:f.get('image').trim(),featured:f.get('featured')==='true',rating:Number(f.get('rating'))||0,review:{vendor:f.get('vendor').trim(),price:f.get('price').trim(),type:f.get('type').trim(),bestFor:f.get('bestFor').trim()},affiliateUrl:f.get('affiliateUrl').trim(),affiliateLabel:f.get('affiliateLabel').trim(),disclosure:f.get('disclosure').trim(),pros:splitLines(f.get('pros')),cons:splitLines(f.get('cons')),content:f.get('content')};
  };
  const renderPreview = () => { const p=formToPost(); preview.innerHTML=`${p.image?`<img src="${esc(p.image)}" alt="">`:''}<h1>${esc(p.title||'Article title')}</h1><p><strong>${esc(p.categories?.[0]||'Category')}</strong> · ${esc(p.date||'Date')}</p><p>${esc(p.excerpt)}</p>${p.disclosure?`<blockquote>${esc(p.disclosure)}</blockquote>`:''}${p.affiliateUrl?`<div class="cta"><h2>Check the current offer</h2><a href="${esc(p.affiliateUrl)}">${esc(p.affiliateLabel||'Check Current Offer')}</a></div>`:''}<div>${p.content||''}</div>`; };
  list.addEventListener('click',e=>{const item=e.target.closest('[data-id]');if(!item)return;selectedId=Number(item.dataset.id);renderList();fill(selected());});
  form.elements.title.addEventListener('blur',()=>{if(!form.elements.slug.value)form.elements.slug.value=slugify(form.elements.title.value)});
  form.addEventListener('submit',e=>{e.preventDefault();const p=formToPost();const i=data.posts.findIndex(x=>x.id===p.id);if(i>=0)data.posts[i]=p;else data.posts.push(p);selectedId=p.id;persist('Post saved locally. Export posts.js to publish.');fill(p);});
  document.getElementById('preview-button').addEventListener('click',renderPreview);
  document.getElementById('new-post').addEventListener('click',()=>{const p={id:Date.now(),slug:'',title:'',excerpt:'',date:new Date().toISOString().slice(0,10),updated:new Date().toISOString().slice(0,10),author:'Editorial Team',categories:['Product Reviews'],tags:[],image:'',featured:false,rating:0,review:{vendor:'',price:'',type:'Digital product',bestFor:''},affiliateUrl:'',affiliateLabel:'Check Current Offer',disclosure:'This article may contain affiliate links.',pros:[],cons:[],content:'<p>Write your introduction here.</p><h2>Quick verdict</h2><p>Add your verified review.</p>'};data.posts.push(p);selectedId=p.id;persist('New draft created.');fill(p);});
  document.getElementById('delete-post').addEventListener('click',()=>{if(!selectedId||!confirm('Delete this post from the local editor?'))return;data.posts=data.posts.filter(p=>p.id!==selectedId);selectedId=data.posts[0]?.id||null;persist('Post deleted locally.');if(selected())fill(selected());else form.reset();});
  document.getElementById('export-file').addEventListener('click',()=>{const text=`/* Exported by DigiReview Content Editor */\nwindow.BLOG_DATA = ${JSON.stringify(data,null,2)};\n`;const blob=new Blob([text],{type:'application/javascript'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='posts.js';a.click();URL.revokeObjectURL(a.href);status.textContent='posts.js exported.';});
  document.getElementById('import-file').addEventListener('click',()=>document.getElementById('file-input').click());
  document.getElementById('file-input').addEventListener('change',async e=>{const file=e.target.files[0];if(!file)return;const text=await file.text();try{let parsed;if(file.name.endsWith('.json'))parsed=JSON.parse(text);else{const match=text.match(/window\.BLOG_DATA\s*=\s*([\s\S]*);\s*$/);if(!match)throw new Error('BLOG_DATA not found');parsed=Function(`"use strict";return (${match[1]})`)();}if(!parsed.posts)throw new Error('posts missing');data=parsed;selectedId=data.posts[0]?.id||null;persist('File imported into the local editor.');if(selected())fill(selected());}catch(err){status.textContent='Import failed: '+err.message;}});
  renderList(); if(selected())fill(selected());
})();
</script>
</body>
</html>
